name: Feature request
description: Suggest a new capability, tool, or improvement to agentmako.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user-facing pain or workflow gap. The "why" matters more than the proposed shape.
      placeholder: When my agent ..., I have to ... because Mako does not currently ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Mako to do? A new tool, a flag, a contract change, an indexer behavior, etc. Include rough shape if you have one.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they fall short.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Concrete project shape (language mix, framework, database), MCP client, or links to prior discussion.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This fits Mako's "local-first project intelligence" scope (no hosted service, no telemetry pipeline).
          required: true
